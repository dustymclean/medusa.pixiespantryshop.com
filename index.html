<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medusa Distribution | Pixie's Pantry Shop</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #d4af37;
            margin-bottom: 30px;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2a2a3e;
            color: #fff;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .product {
            cursor: pointer;
        }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            background: #000;
            transition: transform 0.3s;
        }
        .product:hover img {
            transform: scale(1.05);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .modal-content {
            background-color: #1a1a2e;
            margin: 5% auto;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            color: #fff;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 2em;
            cursor: pointer;
            color: #aaa;
        }
        .modal img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 4px;
        }
        .product h3 {
            margin: 10px 0;
            font-size: 1em;
            color: #fff;
        }
        .product p {
            margin: 5px 0;
            color: #aaa;
        }
        .product .price {
            font-weight: bold;
            color: #d4af37;
            font-size: 1.2em;
        }
        .badge {
            position: absolute;
            padding: 5px 10px;
            font-size: 0.7em;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            color: #111;
        }
        .badge-pick {
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #d4af37, #f4d03f);
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
        }
        .badge-sale {
            top: 10px;
            right: 10px;
            background: #e74c3c;
        }
        .badge-featured {
            bottom: 10px;
            left: 10px;
            background: #9b59b6;
        }
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            color: #888;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Medusa Distribution | Pixie's Pantry Shop</h1>
    
    <div class="filters">
        <select id="brand-filter">
            <option value="">All Brands</option>
        </select>
        <select id="category-filter">
            <option value="">All Categories</option>
        </select>
        <select id="badge-filter">
            <option value="">All Badges</option>
            <option value="pick">Pixie's Pick</option>
            <option value="sale">On Sale</option>
            <option value="featured">Featured</option>
        </select>
        <input type="text" id="search" placeholder="Search products...">
    </div>
    
    <div class="products" id="products">
        <!-- Products will be loaded dynamically -->
    </div>
    
    <!-- Modal for product details -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Product Name</h2>
            <img id="modal-image" src="" alt="Product Image">
            <p id="modal-description"></p>
            <p>SKU: <span id="modal-sku"></span></p>
            <p class="price">
                <span id="modal-msrp" style="text-decoration: line-through; color: #888;"></span>
                $<span id="modal-price"></span>
            </p>
            <p>Stock: <span id="modal-stock"></span></p>
            <p>Wholesale: $<span id="modal-wholesale"></span></p>
            <div id="modal-specs"></div>
        </div>
    </div>
    
    <script>
        // Load product data
        fetch('data/medusa_products_advanced.csv')
            .then(response => response.text())
            .then(data => {
                const products = parseCSV(data);
                populateFilters(products);
                renderProducts(products);
                
                // Add event listeners for filters
                document.getElementById('brand-filter').addEventListener('change', () => renderProducts(products));
                document.getElementById('category-filter').addEventListener('change', () => renderProducts(products));
                document.getElementById('badge-filter').addEventListener('change', () => renderProducts(products));
                document.getElementById('search').addEventListener('input', () => renderProducts(products));
            });
        
        // Parse CSV data
        function parseCSV(data) {
            const lines = data.split('\n');
            const headers = lines[0].split(',');
            const products = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].split(',');
                const product = {
                    brand: values[0],
                    name: values[1],
                    sku: values[2],
                    price: parseFloat(values[3]),
                    stock: parseInt(values[4]),
                    image_filename: values[5],
                    is_pick: values[6] === 'True',
                    is_sale: values[7] === 'True',
                    is_featured: values[8] === 'True'
                };
                products.push(product);
            }
            return products;
        }
        
        // Populate filter dropdowns
        function populateFilters(products) {
            const brands = [...new Set(products.map(p => p.brand))].sort();
            const brandFilter = document.getElementById('brand-filter');
            
            brands.forEach(brand => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandFilter.appendChild(option);
            });
            
            // Categories would be populated similarly if available
        }
        
        // Render products with filters
        function renderProducts(products) {
            const brandFilter = document.getElementById('brand-filter').value;
            const badgeFilter = document.getElementById('badge-filter').value;
            const searchQuery = document.getElementById('search').value.toLowerCase();
            
            const productsContainer = document.getElementById('products');
            productsContainer.innerHTML = '';
            
            const filteredProducts = products.filter(product => {
                const matchesBrand = !brandFilter || product.brand === brandFilter;
                const matchesBadge = !badgeFilter || 
                    (badgeFilter === 'pick' && product.is_pick) ||
                    (badgeFilter === 'sale' && product.is_sale) ||
                    (badgeFilter === 'featured' && product.is_featured);
                const matchesSearch = !searchQuery || 
                    product.name.toLowerCase().includes(searchQuery) ||
                    product.sku.toLowerCase().includes(searchQuery) ||
                    product.brand.toLowerCase().includes(searchQuery);
                
                return matchesBrand && matchesBadge && matchesSearch;
            });
            
            if (filteredProducts.length === 0) {
                productsContainer.innerHTML = '<div class="no-results">No products found. Try adjusting your filters.</div>';
                return;
            }
            
            filteredProducts.forEach(product => {
                const productElement = document.createElement('div');
                productElement.className = 'product';
                
                // Add badges
                if (product.is_pick) {
                    productElement.innerHTML += '<div class="badge badge-pick">⭐ Pixie\'s Pick</div>';
                }
                if (product.is_sale) {
                    productElement.innerHTML += '<div class="badge badge-sale">🔥 On Sale</div>';
                }
                if (product.is_featured) {
                    productElement.innerHTML += '<div class="badge badge-featured">⭐ Featured</div>';
                }
                
                // Add product content
                productElement.innerHTML += `
                    <img src="images/${product.image_filename}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>SKU: ${product.sku}</p>
                    <p class="price">
                        ${product.msrp > product.price ? `<span style="text-decoration: line-through; color: #888;">$${product.msrp.toFixed(2)}</span> ` : ''}$${product.price.toFixed(2)}
                    </p>
                    <p>Stock: ${product.stock}</p>
                    <p style="font-size: 0.8em; color: #aaa;">SKU: ${product.sku}</p>
                `;
                
                productsContainer.appendChild(productElement);
            });
        }
    </script>
</body>
</html>
